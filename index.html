<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kyrson Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0e0e0e;
      color: #eee;
      margin: 0;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: bold;
      margin-bottom: 2rem;
      color: #aaa;
    }
    .box {
      width: 320px;
      background-color: #1e1e1e;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1.2rem;
      text-align: center;
      font-size: 1.2rem;
      overflow-wrap: break-word;
    }
    .button-wrapper {
      margin-top: 1.5rem;
    }
    button {
      padding: 0.8rem 1.2rem;
      background-color: #006aff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background-color: #0052cc;
    }
    #wallet-address {
      margin-top: 0.8rem;
      font-size: 1rem;
      color: #ccc;
    }
    input, select {
      padding: 0.5rem;
      margin-top: 1rem;
      width: 280px;
      border-radius: 6px;
      border: 1px solid #666;
      background-color: #222;
      color: #eee;
    }
    .blink {
      animation: blinkAnim 2s infinite;
    }
    @keyframes blinkAnim {
      0%, 100% { color: #000; }
      50% { color: red; }
    }
  </style>
</head>
<body>
  <h1>Kurs Kyrson (KRS)</h1>

  <div class="box">KRS / ETH<br><strong><span id="WETH">-</span></strong></div>
  <div class="box">KRS / USDC<br><strong><span id="USDC">-</span></strong></div>
  <div class="box">ETH w PLN (na podstawie KRS)<br><strong><span id="ETHPLN">-</span></strong></div>
  <div class="box">ETH kurs rynkowy<br><strong><span id="ETHREAL">-</span></strong></div>
  <div class="box" id="alertBox" style="display:none; background-color:#402020; color:#ffaaaa;">⚠️ Różnica kursów przekracza 5%</div>

  <div class="button-wrapper">
    <button onclick="connectWallet()">🔗 Połącz portfel</button>
    <p id="wallet-address">Nie połączono</p>
  </div>

  <div class="box" id="buyBox" style="display:none;">
    Kup Kyrsony<br>
    <input type="number" id="amountToBuy" placeholder="Podaj ilość KRS" />
    <select id="currencySelect">
      <option value="ETH">ETH</option>
      <option value="USDC">USDC</option>
    </select>
    <br><br>
    <button onclick="buyKRS()">🛒 Kup teraz</button>
    <p id="buyStatus"></p>
  </div>

  <div class="box">
    <p><strong class="blink">Sieć: Arbitrum One</strong></p>
    <p><strong>Kontrakt KRS:</strong><br><code id="krsAddress">0x521e58970fBa0AEAF6DC9C2e994ec9e9CD71A070</code></p>
    <button onclick="copyKRSAddress()">📋 Kopiuj adres</button>
    <br><br>
    <button onclick="addTokenToWallet()">➕ Dodaj KRS do portfela</button>
  </div>

  <script>
    const KRS_CONTRACT = "0x521e58970fBa0AEAF6DC9C2e994ec9e9CD71A070";
    const ABI = [
      "function balanceOf(address owner) view returns (uint256)",
      "function decimals() view returns (uint8)",
      "function approve(address spender, uint256 amount) returns (bool)"
    ];
    const USDC_ADDRESS = "0xff970a61a04b1ca14834a43f5de4533ebddb5cc8";
    const UNISWAP_ROUTER = "0xE592427A0AEce92De3Edee1F18E0157C05861564"; // Uniswap V3 Router on Arbitrum

    let provider, signer, userAddress;

    async function connectWallet() {
      if (window.ethereum) {
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        userAddress = await signer.getAddress();
        document.getElementById("wallet-address").textContent = `Połączono: ${userAddress}`;
        document.getElementById("buyBox").style.display = "block";
        fetchKursy();
      } else {
        alert("Zainstaluj MetaMask, aby połączyć portfel.");
      }
    }

    async function fetchKursy() {
      try {
        const res = await fetch("https://raw.githubusercontent.com/chonomitu/krs-monitor/main/kursy.json");
        const data = await res.json();
        document.getElementById("WETH").textContent = `${parseFloat(data.WETH).toFixed(6)} PLN`;
        document.getElementById("USDC").textContent = `${parseFloat(data.USDC).toFixed(6)} USD`;
      } catch (e) {
        console.error("Błąd pobierania kursów:", e);
      }
    }

    async function buyKRS() {
      const amount = parseFloat(document.getElementById("amountToBuy").value);
      const currency = document.getElementById("currencySelect").value;

      if (isNaN(amount) || amount <= 0) {
        alert("Podaj poprawną ilość KRS");
        return;
      }

      if (!signer) {
        alert("Najpierw połącz portfel.");
        return;
      }

      if (currency === "ETH") {
        const ethToSend = ethers.utils.parseEther((amount * 0.0001).toFixed(6));
        try {
          const tx = await signer.sendTransaction({
            to: KRS_CONTRACT,
            value: ethToSend
          });
          document.getElementById("buyStatus").textContent = "⏳ Oczekiwanie na potwierdzenie...";
          await tx.wait();
          document.getElementById("buyStatus").textContent = "✅ Transakcja zakończona!";
        } catch (err) {
          console.error("Błąd transakcji:", err);
          document.getElementById("buyStatus").textContent = "❌ Nie udało się kupić KRS";
        }
      } else if (currency === "USDC") {
        try {
          const router = new ethers.Contract(UNISWAP_ROUTER, ["function exactInputSingle((address,address,uint24,address,uint256,uint256,uint160)) payable returns (uint256 amountOut)"] , signer);
          const usdcAmount = ethers.utils.parseUnits((amount * 0.25).toString(), 6); // zakładamy kurs 1 KRS = 0.25 USDC

          const usdc = new ethers.Contract(USDC_ADDRESS, ABI, signer);
          await usdc.approve(UNISWAP_ROUTER, usdcAmount);

          const params = {
            tokenIn: USDC_ADDRESS,
            tokenOut: KRS_CONTRACT,
            fee: 3000,
            recipient: userAddress,
            deadline: Math.floor(Date.now() / 1000) + 60 * 10,
            amountIn: usdcAmount,
            amountOutMinimum: 0,
            sqrtPriceLimitX96: 0
          };

          const tx = await router.exactInputSingle(params);
          document.getElementById("buyStatus").textContent = "⏳ Oczekiwanie na potwierdzenie...";
          await tx.wait();
          document.getElementById("buyStatus").textContent = "✅ Zakup zakończony przez Uniswap!";
        } catch (err) {
          console.error("Błąd zakupu przez Uniswap:", err);
          document.getElementById("buyStatus").textContent = "❌ Nie udało się kupić KRS przez USDC";
        }
      }
    }

    function copyKRSAddress() {
      const text = document.getElementById("krsAddress").textContent;
      navigator.clipboard.writeText(text).then(() => alert("Skopiowano adres kontraktu!"));
    }

    function addTokenToWallet() {
      if (window.ethereum) {
        window.ethereum.request({
          method: "wallet_watchAsset",
          params: {
            type: "ERC20",
            options: {
              address: KRS_CONTRACT,
              symbol: "KRS",
              decimals: 18,
              image: "https://example.com/krs.png"
            }
          }
        });
      }
    }
  </script>
</body>
</html>

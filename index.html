
<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kurs Kyrson (KRS)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111;
      color: #eee;
      padding: 2rem;
      text-align: center;
    }
    .box {
      border: 1px solid #444;
      padding: 1rem;
      border-radius: 10px;
      margin: 1rem auto;
      max-width: 500px;
      background-color: #1e1e1e;
    }
    .label {
      font-size: 1.2rem;
      color: #aaa;
    }
    .value {
      font-size: 2rem;
      font-weight: bold;
      margin-top: 0.3rem;
    }
    .button {
      margin-top: 2rem;
    }
    button {
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      background-color: #0f62fe;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0353e9;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@metamask/detect-provider/dist/detect-provider.min.js"></script>
</head>
<body>
  <h1>Kurs Kyrson (KRS)</h1>

  <div class="box">
    <div class="label">KRS / ETH</div>
    <div class="value" id="krsEth">...</div>
  </div>

  <div class="box">
    <div class="label">KRS / USDC</div>
    <div class="value" id="krsUsdc">...</div>
  </div>

  <div class="box">
    <div class="label">ETH w PLN</div>
    <div class="value" id="ethPln">...</div>
  </div>

  <div class="button">
    <button onclick="connectWallet()">🔗 Połącz portfel</button>
    <div id="walletAddress" style="margin-top: 1rem; color: #0f0;"></div>
  </div>

  <script>
    async function fetchKurs() {
      try {
        const res = await fetch('https://raw.githubusercontent.com/chonomitu/krs-monitor/main/kursy.json');
        const data = await res.json();
        document.getElementById('krsEth').textContent = `${data.krs_eth_pln.toFixed(2)} PLN`;
        document.getElementById('krsUsdc').textContent = `${data.krs_usdc_pln.toFixed(2)} PLN`;
        document.getElementById('ethPln').textContent = `${data.eth_pln.toFixed(2)} PLN`;
      } catch (err) {
        document.getElementById('krsEth').textContent = '-';
        document.getElementById('krsUsdc').textContent = '-';
        document.getElementById('ethPln').textContent = '-';
        console.error('Błąd pobierania kursu:', err);
      }
    }

    async function connectWallet() {
      const provider = await detectEthereumProvider();
      if (provider) {
        try {
          const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
          document.getElementById('walletAddress').textContent = `Połączono: ${accounts[0]}`;
        } catch (err) {
          console.error('Nie udało się połączyć portfela', err);
        }
      } else {
        alert('Zainstaluj MetaMask, aby połączyć portfel.');
      }
    }

    fetchKurs();
    setInterval(fetchKurs, 30000);
  </script>
</body>
</html>
